const STORAGE_KEY = "rod_dee_mas_dinner_v2";

async function saveOrderToSheet(order) {
  try {
    await fetch(SCRIPT_URL, { method:"POST", mode:"no-cors", headers:{"Content-Type":"application/json"}, body:JSON.stringify(order) });
  } catch(e) {}
}
async function loadOrdersFromStorage() {
  try { const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):[]; } catch(e){return[];}
}
async function saveOrdersToStorage(o) { localStorage.setItem(STORAGE_KEY,JSON.stringify(o)); }

const FOOD_CATS = ["⭐ Popular","🥗 Starter","🌱 Vegetarian","🥗 Salad Corner","🍚 Rice","🍜 Noodles","🥣 Boat Noodle","🥦 Vegetables","🥚 Omelette & Tofu","🥩 Beef","🐷 Pork","🍗 Chicken","🦐 Seafood","🐟 Fish","🍛 Curry & Soup"];
const DRINK_CATS = ["🧊 Cold Drinks","☕ Hot Drinks"];
const DESSERT_CATS = ["🍨 Desserts"];
const ALL_CATS = [...FOOD_CATS, ...DRINK_CATS, ...DESSERT_CATS];

function App() {
  const [view, setView] = useState("order");
  const [tab, setTab] = useState("food");
  const [eid, setEid] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [orders, setOrders] = useState([]);
  const [adminPw, setAdminPw] = useState("");
  const [adminError, setAdminError] = useState("");
  const [adminTab, setAdminTab] = useState("summary");
  const [summaryFilter, setSummaryFilter] = useState("all");
  const [loading, setLoading] = useState(false);
  const [adminLoading, setAdminLoading] = useState(false);
  const [submittedEid, setSubmittedEid] = useState("");
  const [submittedItems, setSubmittedItems] = useState([]);

  useEffect(()=>{ loadOrdersFromStorage().then(setOrders); },[]);

  function toggle(item) {
    setSelected(prev=>{ const n=new Set(prev); n.has(item)?n.delete(item):n.add(item); return n; });
  }

  async function submitOrder() {
    if(!eid.trim()){alert("Please enter your EID!");return;}
    if(selected.size===0){alert("Please select at least one item!");return;}
    setLoading(true);
    const ts=new Date().toLocaleString("en-SG",{timeZone:"Asia/Singapore",day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
    const newOrder={eid:eid.trim().toUpperCase(),items:[...selected],timestamp:ts};
    await saveOrderToSheet(newOrder);
    const current=await loadOrdersFromStorage();
    const idx=current.findIndex(o=>o.eid===newOrder.eid);
    if(idx>=0) current[idx]=newOrder; else current.push(newOrder);
    await saveOrdersToStorage(current);
    setOrders(current);
    setSubmittedEid(newOrder.eid);
    setSubmittedItems([...selected]);
    setEid(""); setSelected(new Set()); setTab("food");
    setLoading(false);
    setView("done");
  }

  async function fetchOrdersFromSheet() {
    try {
      const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
      const data = await res.json();
      if(data.result === "success" && data.orders) {
        // Merge sheet orders with local orders (sheet is source of truth)
        const sheetOrders = data.orders.filter(o => o.eid && o.items && o.items.length > 0);
        await saveOrdersToStorage(sheetOrders);
        setOrders(sheetOrders);
        return sheetOrders;
      }
    } catch(e) {
      // Fall back to localStorage if fetch fails
      const local = await loadOrdersFromStorage();
      setOrders(local);
    }
  }

  function adminLogin() {
    if(adminPw===ADMIN_PASSWORD){
      setAdminError("");
      setView("admin");
      setAdminLoading(true);
      fetchOrdersFromSheet().finally(()=>setAdminLoading(false));
    }
    else setAdminError("Wrong password. Try again.");
  }

  async function clearOrders() {
    if(!window.confirm("Clear ALL orders? This cannot be undone."))return;
    await saveOrdersToStorage([]);
    setOrders([]);
  }

  async function refreshOrders() {
    setAdminLoading(true);
    await fetchOrdersFromSheet();
    setAdminLoading(false);
  }

  function buildSummary() {
    const s={};
    orders.forEach(o=>o.items.forEach(item=>{if(!s[item])s[item]=[];s[item].push(o.eid);}));
    return s;
  }
  const summary=buildSummary();

  function getFilteredSummary() {
    if(summaryFilter==="all") return summary;
    const cats=summaryFilter==="food"?FOOD_CATS:summaryFilter==="drinks"?DRINK_CATS:DESSERT_CATS;
    const items=cats.flatMap(c=>(MENU[c]||[]).map(i=>i.name));
    return Object.fromEntries(Object.entries(summary).filter(([k])=>items.includes(k)));
  }
  const sortedSummary=Object.entries(getFilteredSummary()).sort((a,b)=>b[1].length-a[1].length);
  const tabCats=tab==="food"?FOOD_CATS:tab==="drinks"?DRINK_CATS:DESSERT_CATS;

  // ORDER FORM
  if(view==="order") return (
    <div style={{fontFamily:"inherit",background:"#FAFAF8",minHeight:"100vh",paddingBottom:80}}>
      <div style={{background:"#C0392B",color:"#fff",padding:"24px 20px 20px",textAlign:"center"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",opacity:0.75,marginBottom:6}}>MAS Account · Team Dinner Order</div>
        <div style={{fontSize:26,fontWeight:800,marginBottom:4}}>🌶 Rod Dee Thai Cafe</div>
        <div style={{fontSize:13,opacity:0.8}}>Teo Hong Road · Select what you'd like for dinner</div>
      </div>

      <div style={{background:"#fff",borderBottom:"1px solid #E8E3DC",padding:"16px 20px"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#7A746C",marginBottom:8}}>Your EID</div>
        <input value={eid} onChange={e=>setEid(e.target.value)} placeholder="e.g. JAMES.HWA.JAAN.GAN"
          style={{width:"100%",maxWidth:360,border:"1.5px solid #E8E3DC",borderRadius:8,padding:"10px 14px",fontSize:15,fontFamily:"inherit",background:"#FAFAF8"}}/>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #E8E3DC",padding:"0 16px",overflowX:"auto",position:"sticky",top:0,zIndex:10}}>
        {[["food","🍜 Food"],["drinks","🧋 Drinks"],["dessert","🍨 Desserts"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:"13px 18px",fontSize:13,fontWeight:600,color:tab===k?"#C0392B":"#7A746C",background:"none",border:"none",borderBottom:tab===k?"2.5px solid #C0392B":"2.5px solid transparent",marginBottom:-2,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{l}</button>
        ))}
      </div>

      {/* Menu Items */}
      <div style={{padding:"0 12px"}}>
        {tabCats.map(cat=>(
          <div key={cat}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#D4A843",padding:"16px 4px 8px",borderTop:"1px solid #E8E3DC",marginTop:4}}>{cat}</div>
            {(MENU[cat]||[]).map(item=>{
              const on=selected.has(item.name);
              return (
                <div key={item.name} onClick={()=>toggle(item.name)}
                  style={{display:"flex",alignItems:"center",gap:12,padding:"10px 4px",borderBottom:"1px solid #F0ECE7",cursor:"pointer",background:on?"#E8F4ED":"transparent",borderRadius:8,marginBottom:2,transition:"background 0.1s"}}>
                  <div style={{width:20,height:20,border:on?"2px solid #2E7D5A":"2px solid #ddd",borderRadius:5,background:on?"#2E7D5A":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    {on&&<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 4L4 7L10 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <span style={{fontSize:14,fontWeight:500,color:"#1C1C1A",flex:1,lineHeight:1.3}}>{item.name}</span>
                  {item.img && (
                    <img src={item.img} alt={item.name}
                      style={{width:56,height:56,objectFit:"cover",borderRadius:8,flexShrink:0,border:"1px solid #eee"}}
                      onError={e=>{e.target.style.display="none";}}/>
                  )}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Bottom bar */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #E8E3DC",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 -4px 20px rgba(0,0,0,0.06)",zIndex:20}}>
        <div style={{flex:1,fontSize:13,color:"#7A746C"}}><span style={{fontWeight:700,color:"#1C1C1A"}}>{selected.size}</span> items selected</div>
        <button onClick={submitOrder} disabled={loading}
          style={{background:loading?"#aaa":"#C0392B",color:"#fff",border:"none",borderRadius:10,padding:"12px 24px",fontSize:14,fontWeight:600,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit"}}>
          {loading?"Saving...":"Submit Order →"}
        </button>
      </div>
      <div style={{textAlign:"center",padding:"28px 0 8px"}}>
        <button onClick={()=>setView("adminLogin")} style={{fontSize:12,color:"#bbb",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Admin View</button>
      </div>
    </div>
  );

  // DONE
  if(view==="done") return (
    <div style={{fontFamily:"inherit",background:"#FAFAF8",minHeight:"100vh",padding:24}}>
      <div style={{background:"#2E7D5A",color:"#fff",borderRadius:16,padding:28,textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:48,marginBottom:8}}>✅</div>
        <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>Order Submitted!</div>
        <div style={{fontSize:14,opacity:0.85}}>Your dinner order has been recorded successfully.</div>
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:16,marginBottom:12,border:"1px solid #E8E3DC"}}>
        <div style={{fontSize:11,color:"#7A746C",marginBottom:4,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>EID</div>
        <div style={{fontSize:18,fontWeight:800}}>{submittedEid}</div>
      </div>
      <div style={{background:"#fff",borderRadius:12,padding:16,border:"1px solid #E8E3DC",marginBottom:20}}>
        <div style={{fontSize:11,color:"#7A746C",marginBottom:12,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Your selections ({submittedItems.length} items)</div>
        {submittedItems.map(item=>(
          <div key={item} style={{fontSize:14,padding:"7px 0",borderBottom:"1px solid #F0ECE7"}}>• {item}</div>
        ))}
      </div>
      <button onClick={()=>setView("order")} style={{display:"block",width:"100%",background:"#C0392B",color:"#fff",border:"none",borderRadius:10,padding:14,fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
        ← Submit Another Order
      </button>
    </div>
  );

  // ADMIN LOGIN
  if(view==="adminLogin") return (
    <div style={{fontFamily:"inherit",background:"#FAFAF8",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#fff",borderRadius:16,padding:32,width:"100%",maxWidth:360,border:"1px solid #E8E3DC",boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>🔐</div>
          <div style={{fontSize:20,fontWeight:800}}>Admin Access</div>
          <div style={{fontSize:13,color:"#7A746C",marginTop:4}}>Rod Dee Thai Cafe · MAS Account</div>
        </div>
        <input type="password" placeholder="Enter admin password" value={adminPw}
          onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adminLogin()}
          style={{width:"100%",border:"1.5px solid #E8E3DC",borderRadius:8,padding:"12px 14px",fontSize:15,fontFamily:"inherit",marginBottom:10,boxSizing:"border-box"}}/>
        {adminError&&<div style={{color:"#C0392B",fontSize:13,marginBottom:10}}>{adminError}</div>}
        <button onClick={adminLogin} style={{display:"block",width:"100%",background:"#C0392B",color:"#fff",border:"none",borderRadius:10,padding:14,fontSize:15,fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:10}}>Login →</button>
        <button onClick={()=>setView("order")} style={{display:"block",width:"100%",background:"#F0EDE8",color:"#555",border:"none",borderRadius:10,padding:12,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>← Back to Order Form</button>
      </div>
    </div>
  );

  // ADMIN DASHBOARD
  if(view==="admin") return (
    <div style={{fontFamily:"inherit",background:"#FAFAF8",minHeight:"100vh",paddingBottom:40}}>
      <div style={{background:"#1C1C1A",color:"#fff",padding:"20px 20px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",opacity:0.4}}>Admin Dashboard</div>
          <button onClick={refreshOrders} disabled={adminLoading} style={{background:"#333",color:"#fff",border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",opacity:adminLoading?0.5:1}}>{adminLoading?"Loading...":"🔄 Refresh"}</button>
        </div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:14}}>🌶 Rod Dee Dinner · MAS Account</div>
        <div style={{display:"flex",gap:10}}>
          {[["#2E7D5A",orders.length,"Orders"],["#C0392B",Object.values(summary).reduce((a,b)=>a+b.length,0),"Total Items"],["#D4A843",Object.keys(summary).length,"Unique Dishes"]].map(([bg,val,label])=>(
            <div key={label} style={{background:bg,borderRadius:10,padding:"10px 0",textAlign:"center",flex:1}}>
              <div style={{fontSize:22,fontWeight:800}}>{val}</div>
              <div style={{fontSize:11,opacity:0.85}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"flex",borderBottom:"2px solid #E8E3DC",background:"#fff",padding:"0 16px"}}>
        {[["summary","📊 Summary"],["individual","👤 By Person"]].map(([k,l])=>(
          <button key={k} onClick={()=>setAdminTab(k)} style={{padding:"13px 18px",fontSize:13,fontWeight:600,color:adminTab===k?"#1C1C1A":"#7A746C",background:"none",border:"none",borderBottom:adminTab===k?"2.5px solid #1C1C1A":"2.5px solid transparent",marginBottom:-2,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {adminLoading?(
          <div style={{textAlign:"center",padding:"48px 24px",color:"#7A746C"}}>
            <div style={{fontSize:32,marginBottom:12}}>⏳</div>
            <div style={{fontSize:15,fontWeight:600}}>Loading orders from Google Sheets...</div>
          </div>
        ):orders.length===0?(
          <div style={{textAlign:"center",padding:"48px 24px",color:"#7A746C"}}>
            <div style={{fontSize:40,marginBottom:12}}>📭</div>
            <div style={{fontSize:16,fontWeight:600}}>No orders yet</div>
            <div style={{fontSize:13,marginTop:4}}>Share the link with your team</div>
          </div>
        ):adminTab==="individual"?(
          <div>
            <div style={{fontSize:13,color:"#7A746C",marginBottom:12}}>{orders.length} order(s) received</div>
            {orders.map((order,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:16,marginBottom:12,border:"1px solid #E8E3DC"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:16}}>{order.eid}</div>
                    <div style={{fontSize:11,color:"#7A746C",marginTop:2}}>{order.timestamp}</div>
                  </div>
                  <span style={{background:"#E8F4ED",color:"#2E7D5A",borderRadius:20,padding:"4px 10px",fontSize:12,fontWeight:600}}>{order.items.length} items</span>
                </div>
                {order.items.map(item=>(
                  <div key={item} style={{fontSize:13,padding:"6px 0",borderBottom:"1px solid #F0ECE7"}}>• {item}</div>
                ))}
              </div>
            ))}
          </div>
        ):(
          <div>
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
              {[["all","All"],["food","🍜 Food"],["drinks","🧋 Drinks"],["dessert","🍨 Desserts"]].map(([k,l])=>(
                <button key={k} onClick={()=>setSummaryFilter(k)} style={{padding:"6px 14px",fontSize:12,fontWeight:600,borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",background:summaryFilter===k?"#1C1C1A":"#E8E3DC",color:summaryFilter===k?"#fff":"#1C1C1A"}}>{l}</button>
              ))}
            </div>
            {sortedSummary.length===0
              ?<div style={{textAlign:"center",padding:32,color:"#7A746C",fontSize:14}}>No items in this category</div>
              :sortedSummary.map(([item,eids])=>(
                <div key={item} style={{background:"#fff",borderRadius:12,padding:16,marginBottom:10,border:"1px solid #E8E3DC"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{fontWeight:600,fontSize:14,flex:1,paddingRight:12}}>{item}</div>
                    <span style={{background:"#C0392B",color:"#fff",borderRadius:20,padding:"3px 10px",fontSize:13,fontWeight:700,flexShrink:0}}>{eids.length} order{eids.length>1?"s":""}</span>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {eids.map((e,i)=><span key={i} style={{background:"#F0F0F0",borderRadius:20,padding:"3px 10px",fontSize:12,color:"#444",fontWeight:500}}>{e}</span>)}
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>

      <div style={{padding:"12px 16px 0",display:"flex",gap:10}}>
        <button onClick={()=>{setView("order");setAdminPw("");}} style={{flex:1,background:"#E8E3DC",color:"#1C1C1A",border:"none",borderRadius:10,padding:"13px 20px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>← Back to Form</button>
        <button onClick={clearOrders} style={{flex:1,background:"#fff",color:"#C0392B",border:"2px solid #C0392B",borderRadius:10,padding:"13px 20px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>🗑 Clear All</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
