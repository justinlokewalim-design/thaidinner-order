<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rod Dee Thai Cafe – MAS Dinner Order</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #FAFAF8; }
  input:focus { outline: 2px solid #C0392B; border-color: #C0392B !important; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const ADMIN_PASSWORD = "MAS2024";

// Persistent storage using JSONBin.io (free, no account needed for reading)
// We use localStorage as fallback + a shared key approach
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw0rm34D2LIiXMSFenudgwbfEgCWIbQfPcfsaxUUfNZAY0lTFPJI1UlquQkEop6gYn-/exec";
const STORAGE_KEY = "rod_dee_mas_dinner_orders_v1";

// Save order to Google Sheets
async function saveOrderToSheet(order) {
  await fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(order)
  });
}

// Local cache so admin can see orders in same browser session
async function loadOrdersFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

async function saveOrdersToStorage(orders) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
}

const MENU = {
  "⭐ Popular": ["N6. Phat Thai","CS6. Green Curry with Chicken","N11. Beef Boat Noodle Soup","R4. Thai Basil with Rice","N13. Pork Boat Noodle Soup","R7. Thai Fried Rice with Crab Meat"],
  "🥗 Starters": ["S1. Crispy Prawn Cake","S2. Thai Fish Cake","S3. Pork Skewer Moo Ping","S4. Spring Roll","S5. Crispy Mid Joint Wing","S6. Boneless Stuffed Chicken","S7. Pandan Chicken","S9. Sticky Rice","S10. French Fries","S11. Rod Dee Combo A (2-3pax)","S12. Rod Dee Combo B (3-4pax)","S15. Fried Fish Wanton"],
  "🥗 Salads": ["SC1. Mango Salad","SC2. Papaya Salad","SC3. Tofu Mango Salad","SC4. Grill Pork Salad","SC5. Minced Pork Salad","SC6. Yum Woon Sen"],
  "🍚 Rice": ["R1. Tom Yum Fried Rice","R2. Pineapple Fried Rice","R3. Olive Fried Rice","R4. Thai Basil with Rice","R5. Sweet & Sour with Rice","R6. Black Pepper with Rice","R7. Thai Fried Rice with Crab Meat","R8. Scramble Egg with Thai Suki Sauce Prawn Rice","R11. Thai Fried Rice","R9. Fragrance White Rice","R10. Fried Egg"],
  "🍜 Noodles": ["N1. Thai Style Fried Keow Teow","N2. Thai Style Fried Tang Hoon","N3. Thai Stir Fried Mama Noodle","N4. Thai Hor Fun (Soup)","N5. Tom Yum Noodle","N6. Phat Thai","N7. Seafood TomYum MAMA Noodles"],
  "🥣 Boat Noodle": ["N11. Beef Boat Noodle Soup","N12. Beef Boat Noodle Dry","N13. Pork Boat Noodle Soup","N14. Pork Boat Noodle Dry"],
  "🥦 Vegetables": ["V1. Stir Fried Mixed Vegetables with Oyster Sauce","V2. Stir Fried Thai Style Kang Kong","V3. Stir Fried Kai Lan with Oyster Sauce","V4. Long Bean with Thai Chilli Paste","V5. Bean Sprout with Garlic","V6. Roasted Pork Kai Lan"],
  "🥚 Omelette & Tofu": ["OT1. Plain Omelette","OT2. Minced Pork Omelette","OT3. Prawn Omelette","OT4. Crab Meat Omelette","OT5. Deep Fried Tofu with Minced Pork","OT6. Deep Fried Tofu with Sweet & Sour Sauce","OT7. Scramble Egg with Thai Suki Sauce","OT8. Kampong Style Omelette with Onion"],
  "🥩 Beef": ["B1. Basil Slice Beef","B2. Black Pepper Slice Beef","B3. Slice Beef with Oyster Sauce"],
  "🐷 Pork": ["P1. Basil Minced Pork","P2. Black Pepper Slice Pork","P3. Slice Pork with Oyster Sauce","P4. Sweet & Sour Pork","P5. Fried Pork Slice with Thai Chilli Paste","P6. Deep Fried Pork Slice with Garlic","P7. Grilled Pork Collar"],
  "🍗 Chicken": ["C1. Basil Minced Chicken","C2. Black Pepper Chicken","C3. Sweet & Sour Chicken","C4. Cashew Nut Chicken","C5. Chicken Tossed with Thai Chilli Paste"],
  "🦐 Seafood": ["SF1. Basil Seafood","SF2. Deep Fried Prawn with Sweet & Sour Sauce","SF3. Deep Fried Prawn with Garlic","SF4. Stir Fried Prawn with Thai Chili Paste","SF5. Lala with Thai Chilli Paste","SF6. Claypot Glass Noodle with Prawn","SF7. Stir Fried Squid with Thai Chilli Paste","SF8. Steam Sotong with Thai Green Lime","S10. Steam Prawn with Thai Green Lime"],
  "🐟 Fish": ["F1. Slice Fish with Sweet & Sour Sauce","F2. Slice Fish with Black Pepper Sauce","F3. Deep Fried Seabass with Mango Salad","F4. Deep Fried Seabass with Thai 3 Taste Sauce","F5. Steam Seabass with Lemon Garlic","F6. Deep Fried Seabass with Soya Sauce"],
  "🍛 Curry & Soup": ["CS1. Tom Yum Clear Soup with Chicken","CS2. Tom Yum Clear Soup with Seafood","CS3. Red Tom Yum Soup with Chicken","CS4. Red Tom Yum Soup with Seafood","CS5. Tom Ka Gai (Chicken Only)","CS6. Green Curry with Chicken","CS7. Green Curry with Seafood","CS8. Thai Tofu and Pork Soup","CS9. Tom Sapp with Chicken","CS10. Rod Dee Tom Yum Goong Seafood"],
  "🌱 Vegetarian": ["Pineapple Fried Rice (Veg)","Olive Fried Rice (Veg)","Thai Stir Fried Mama Noodle (Veg)","Thai Hor Fun (Veg)","Phat Thai (Veg)","Thai Style Fried Kweo Teow (Veg)","Plain Omelette (Veg)","Green Curry (Veg)","Stir Fried Kai Lan with Oyster Sauce (Veg)","Deep Fried Tofu with Sweet and Sour Sauce (Veg)","Mango Salad (Veg)","Papaya Salad (Veg)","Stir Fried Long Bean with Thai Chilli Paste (Veg)","Stir Fried Bean Sprout with Garlic (Veg)","Sticky Rice (Veg)","French Fries (Veg)"],
  "🧊 Cold Drinks": ["D1. Mineral Water","D3. Thai Ice Milk Tea","D4. Thai Green Milk Tea","D5. Thai Ice Coffee","D6. Thai Lemongrass","D13. Iced Thai Lemon Tea","D7. Coke Can","D7. Coke Zero","D7. Sprite Can","D7. Green Tea Can","D7. Oolong Tea Can","D7. A&W Can","D11. Mango Smoothie","D12. Fresh Coconut"],
  "☕ Hot Drinks": ["D14. Hot Green Tea (Sachet)","D15. Hot Thai Milk Tea","D16. Hot Thai Green Milk Tea","D17. Hot Thai Lemongrass","D18. Hot Thai Coffee"],
  "🍨 Desserts": ["DM2. Red Ruby","DM6. Thai Cendol","DM7. Durian Cendol"]
};

const FOOD_CATS = ["⭐ Popular","🥗 Starters","🥗 Salads","🍚 Rice","🍜 Noodles","🥣 Boat Noodle","🥦 Vegetables","🥚 Omelette & Tofu","🥩 Beef","🐷 Pork","🍗 Chicken","🦐 Seafood","🐟 Fish","🍛 Curry & Soup","🌱 Vegetarian"];
const DRINK_CATS = ["🧊 Cold Drinks","☕ Hot Drinks"];
const DESSERT_CATS = ["🍨 Desserts"];

function App() {
  const [view, setView] = useState("order");
  const [tab, setTab] = useState("food");
  const [eid, setEid] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [orders, setOrders] = useState([]);
  const [adminPw, setAdminPw] = useState("");
  const [adminError, setAdminError] = useState("");
  const [adminTab, setAdminTab] = useState("summary");
  const [summaryFilter, setSummaryFilter] = useState("all");
  const [loading, setLoading] = useState(false);
  const [submittedEid, setSubmittedEid] = useState("");
  const [submittedItems, setSubmittedItems] = useState([]);

  useEffect(() => { loadOrdersFromStorage().then(setOrders); }, []);

  function toggle(item) {
    setSelected(prev => { const n = new Set(prev); n.has(item) ? n.delete(item) : n.add(item); return n; });
  }

  async function submitOrder() {
    if (!eid.trim()) { alert("Please enter your EID!"); return; }
    if (selected.size === 0) { alert("Please select at least one item!"); return; }
    setLoading(true);
    const ts = new Date().toLocaleString("en-SG", { timeZone: "Asia/Singapore", day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
    const newOrder = { eid: eid.trim().toUpperCase(), items: [...selected], timestamp: ts };
    // Send to Google Sheets
    await saveOrderToSheet(newOrder);
    // Also cache locally
    const current = await loadOrdersFromStorage();
    const idx = current.findIndex(o => o.eid === newOrder.eid);
    if (idx >= 0) current[idx] = newOrder; else current.push(newOrder);
    await saveOrdersToStorage(current);
    setOrders(current);
    setSubmittedEid(newOrder.eid);
    setSubmittedItems([...selected]);
    setEid(""); setSelected(new Set()); setTab("food");
    setLoading(false);
    setView("done");
  }

  function adminLogin() {
    if (adminPw === ADMIN_PASSWORD) {
      setAdminError(""); setView("admin");
      loadOrdersFromStorage().then(setOrders);
    } else { setAdminError("Wrong password. Try again."); }
  }

  async function clearOrders() {
    if (!window.confirm("Clear ALL orders? This cannot be undone.")) return;
    await saveOrdersToStorage([]);
    setOrders([]);
  }

  function buildSummary() {
    const s = {};
    orders.forEach(o => o.items.forEach(item => { if(!s[item]) s[item]=[]; s[item].push(o.eid); }));
    return s;
  }

  const summary = buildSummary();

  function getFilteredSummary() {
    if (summaryFilter === "all") return summary;
    const cats = summaryFilter === "food" ? FOOD_CATS : summaryFilter === "drinks" ? DRINK_CATS : DESSERT_CATS;
    const items = cats.flatMap(c => MENU[c] || []);
    return Object.fromEntries(Object.entries(summary).filter(([k]) => items.includes(k)));
  }

  const sortedSummary = Object.entries(getFilteredSummary()).sort((a,b) => b[1].length - a[1].length);
  const tabCats = tab === "food" ? FOOD_CATS : tab === "drinks" ? DRINK_CATS : DESSERT_CATS;

  const S = { // styles shorthand
    page: { fontFamily:"-apple-system,BlinkMacSystemFont,'Inter',sans-serif", background:"#FAFAF8", minHeight:"100vh", paddingBottom:80 },
    header: { background:"#C0392B", color:"#fff", padding:"24px 20px 20px", textAlign:"center" },
    card: { background:"#fff", borderRadius:12, padding:16, marginBottom:12, border:"1px solid #E8E3DC" },
    btn: (bg,color,full) => ({ display:full?"block":"inline-block", width:full?"100%":"auto", background:bg, color:color, border:"none", borderRadius:10, padding:"13px 20px", fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"inherit", marginBottom:8 }),
    tag: (bg,color) => ({ background:bg, color:color, borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:600 }),
  };

  // ORDER FORM
  if (view === "order") return (
    <div style={S.page}>
      <div style={S.header}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",opacity:0.75,marginBottom:6}}>MAS Account · Team Dinner Order</div>
        <div style={{fontSize:26,fontWeight:800,marginBottom:4}}>🌶 Rod Dee Thai Cafe</div>
        <div style={{fontSize:13,opacity:0.8}}>Teo Hong Road · Select what you'd like for dinner</div>
      </div>

      <div style={{background:"#fff",borderBottom:"1px solid #E8E3DC",padding:"16px 20px"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#7A746C",marginBottom:8}}>Your EID</div>
        <input value={eid} onChange={e=>setEid(e.target.value)} placeholder="e.g. E1234567"
          style={{width:"100%",maxWidth:320,border:"1.5px solid #E8E3DC",borderRadius:8,padding:"10px 14px",fontSize:15,fontFamily:"inherit",background:"#FAFAF8"}} />
      </div>

      <div style={{display:"flex",background:"#fff",borderBottom:"2px solid #E8E3DC",padding:"0 16px",overflowX:"auto",position:"sticky",top:0,zIndex:10}}>
        {[["food","🍜 Food"],["drinks","🧋 Drinks"],["dessert","🍨 Desserts"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{padding:"13px 18px",fontSize:13,fontWeight:600,color:tab===k?"#C0392B":"#7A746C",background:"none",border:"none",borderBottom:tab===k?"2.5px solid #C0392B":"2.5px solid transparent",marginBottom:-2,cursor:"pointer",whiteSpace:"nowrap",fontFamily:"inherit"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:"0 16px"}}>
        {tabCats.map(cat=>(
          <div key={cat}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#D4A843",padding:"16px 4px 8px",borderTop:"1px solid #E8E3DC",marginTop:4}}>{cat}</div>
            {MENU[cat].map(item=>{
              const on=selected.has(item);
              return (
                <div key={item} onClick={()=>toggle(item)} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 6px",borderBottom:"1px solid #F0ECE7",cursor:"pointer",background:on?"#E8F4ED":"transparent",borderRadius:6,marginBottom:1}}>
                  <div style={{width:20,height:20,border:on?"2px solid #2E7D5A":"2px solid #ddd",borderRadius:5,background:on?"#2E7D5A":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
                    {on&&<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 4L4 7L10 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <span style={{fontSize:14,fontWeight:500,color:"#1C1C1A",flex:1}}>{item}</span>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #E8E3DC",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 -4px 20px rgba(0,0,0,0.06)",zIndex:20}}>
        <div style={{flex:1,fontSize:13,color:"#7A746C"}}><span style={{fontWeight:700,color:"#1C1C1A"}}>{selected.size}</span> items selected</div>
        <button onClick={submitOrder} disabled={loading} style={{background:loading?"#aaa":"#C0392B",color:"#fff",border:"none",borderRadius:10,padding:"12px 24px",fontSize:14,fontWeight:600,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit"}}>
          {loading?"Saving...":"Submit Order →"}
        </button>
      </div>

      <div style={{textAlign:"center",padding:"28px 0 8px"}}>
        <button onClick={()=>setView("adminLogin")} style={{fontSize:12,color:"#bbb",background:"none",border:"none",cursor:"pointer",textDecoration:"underline"}}>Admin View</button>
      </div>
    </div>
  );

  // DONE
  if (view === "done") return (
    <div style={{fontFamily:"inherit",background:"#FAFAF8",minHeight:"100vh",padding:24}}>
      <div style={{background:"#2E7D5A",color:"#fff",borderRadius:16,padding:28,textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:48,marginBottom:8}}>✅</div>
        <div style={{fontSize:22,fontWeight:800,marginBottom:6}}>Order Submitted!</div>
        <div style={{fontSize:14,opacity:0.85}}>Your dinner order has been recorded. No further action needed!</div>
      </div>
      <div style={{...S.card,marginBottom:12}}>
        <div style={{fontSize:12,color:"#7A746C",marginBottom:4,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>EID</div>
        <div style={{fontSize:20,fontWeight:800,color:"#1C1C1A"}}>{submittedEid}</div>
      </div>
      <div style={S.card}>
        <div style={{fontSize:12,color:"#7A746C",marginBottom:12,textTransform:"uppercase",letterSpacing:1,fontWeight:600}}>Your selections ({submittedItems.length} items)</div>
        {submittedItems.map(item=>(
          <div key={item} style={{fontSize:14,padding:"7px 0",borderBottom:"1px solid #F0ECE7",color:"#1C1C1A"}}>• {item}</div>
        ))}
      </div>
      <button onClick={()=>setView("order")} style={{...S.btn("#C0392B","#fff",true),marginTop:16}}>← Submit Another Order</button>
    </div>
  );

  // ADMIN LOGIN
  if (view === "adminLogin") return (
    <div style={{fontFamily:"inherit",background:"#FAFAF8",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{background:"#fff",borderRadius:16,padding:32,width:"100%",maxWidth:360,border:"1px solid #E8E3DC",boxShadow:"0 4px 24px rgba(0,0,0,0.07)"}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontSize:40,marginBottom:8}}>🔐</div>
          <div style={{fontSize:20,fontWeight:800}}>Admin Access</div>
          <div style={{fontSize:13,color:"#7A746C",marginTop:4}}>Rod Dee Thai Cafe · MAS Account</div>
        </div>
        <input type="password" placeholder="Enter admin password" value={adminPw}
          onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adminLogin()}
          style={{width:"100%",border:"1.5px solid #E8E3DC",borderRadius:8,padding:"12px 14px",fontSize:15,fontFamily:"inherit",marginBottom:10,boxSizing:"border-box"}} />
        {adminError&&<div style={{color:"#C0392B",fontSize:13,marginBottom:10}}>{adminError}</div>}
        <button onClick={adminLogin} style={{...S.btn("#C0392B","#fff",true)}}>Login →</button>
        <button onClick={()=>setView("order")} style={{...S.btn("#F0EDE8","#555",true)}}>← Back to Order Form</button>
      </div>
    </div>
  );

  // ADMIN DASHBOARD
  if (view === "admin") return (
    <div style={{fontFamily:"inherit",background:"#FAFAF8",minHeight:"100vh",paddingBottom:40}}>
      <div style={{background:"#1C1C1A",color:"#fff",padding:"20px 20px 16px"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",opacity:0.4,marginBottom:4}}>Admin Dashboard</div>
        <div style={{fontSize:20,fontWeight:800,marginBottom:14}}>🌶 Rod Dee Dinner · MAS Account</div>
        <div style={{display:"flex",gap:10}}>
          {[["#2E7D5A",orders.length,"Orders"],["#C0392B",Object.values(summary).reduce((a,b)=>a+b.length,0),"Total Items"],["#D4A843",Object.keys(summary).length,"Unique Dishes"]].map(([bg,val,label])=>(
            <div key={label} style={{background:bg,borderRadius:10,padding:"10px 16px",textAlign:"center",flex:1}}>
              <div style={{fontSize:22,fontWeight:800}}>{val}</div>
              <div style={{fontSize:11,opacity:0.85}}>{label}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:"flex",gap:0,borderBottom:"2px solid #E8E3DC",background:"#fff",padding:"0 16px"}}>
        {[["summary","📊 Summary"],["individual","👤 By Person"]].map(([k,l])=>(
          <button key={k} onClick={()=>setAdminTab(k)} style={{padding:"13px 18px",fontSize:13,fontWeight:600,color:adminTab===k?"#1C1C1A":"#7A746C",background:"none",border:"none",borderBottom:adminTab===k?"2.5px solid #1C1C1A":"2.5px solid transparent",marginBottom:-2,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:"16px 16px 0"}}>
        {orders.length === 0 ? (
          <div style={{textAlign:"center",padding:"48px 24px",color:"#7A746C"}}>
            <div style={{fontSize:40,marginBottom:12}}>📭</div>
            <div style={{fontSize:16,fontWeight:600}}>No orders yet</div>
            <div style={{fontSize:13,marginTop:4}}>Share the link with your team</div>
          </div>
        ) : adminTab === "individual" ? (
          <div>
            <div style={{fontSize:13,color:"#7A746C",marginBottom:12}}>{orders.length} order(s) received</div>
            {orders.map((order,i)=>(
              <div key={i} style={S.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:16}}>{order.eid}</div>
                    <div style={{fontSize:11,color:"#7A746C",marginTop:2}}>{order.timestamp}</div>
                  </div>
                  <span style={{...S.tag("#E8F4ED","#2E7D5A")}}>{order.items.length} items</span>
                </div>
                {order.items.map(item=>(
                  <div key={item} style={{fontSize:13,padding:"6px 0",borderBottom:"1px solid #F0ECE7"}}>• {item}</div>
                ))}
              </div>
            ))}
          </div>
        ) : (
          <div>
            <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
              {[["all","All"],["food","🍜 Food"],["drinks","🧋 Drinks"],["dessert","🍨 Desserts"]].map(([k,l])=>(
                <button key={k} onClick={()=>setSummaryFilter(k)} style={{padding:"6px 14px",fontSize:12,fontWeight:600,borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",background:summaryFilter===k?"#1C1C1A":"#E8E3DC",color:summaryFilter===k?"#fff":"#1C1C1A"}}>{l}</button>
              ))}
            </div>
            {sortedSummary.length === 0
              ? <div style={{textAlign:"center",padding:32,color:"#7A746C",fontSize:14}}>No items in this category</div>
              : sortedSummary.map(([item,eids])=>(
                <div key={item} style={S.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{fontWeight:600,fontSize:14,flex:1,paddingRight:12}}>{item}</div>
                    <span style={{...S.tag("#C0392B","#fff"),flexShrink:0}}>{eids.length} order{eids.length>1?"s":""}</span>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {eids.map((e,i)=><span key={i} style={{background:"#F0F0F0",borderRadius:20,padding:"3px 10px",fontSize:12,color:"#444",fontWeight:500}}>{e}</span>)}
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>

      <div style={{padding:"12px 16px 0",display:"flex",gap:10}}>
        <button onClick={()=>{setView("order");setAdminPw("");}} style={{...S.btn("#E8E3DC","#1C1C1A",false),flex:1}}>← Back to Form</button>
        <button onClick={clearOrders} style={{flex:1,background:"#fff",color:"#C0392B",border:"2px solid #C0392B",borderRadius:10,padding:"13px 20px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>🗑 Clear All</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
